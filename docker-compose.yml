services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MAIN_POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${MAIN_POSTGRES_PASS:-test}
      POSTGRES_DB: ${MAIN_POSTGRES_DATABASE:-platform_agent}
    ports:
      - "${MAIN_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    profiles:
      - app
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: docker
      DEBUG: ${DEBUG:-True}
      MAIN_POSTGRES_HOST: postgres
      MAIN_POSTGRES_PORT: 5432
      MAIN_POSTGRES_USER: ${MAIN_POSTGRES_USER:-test}
      MAIN_POSTGRES_PASS: ${MAIN_POSTGRES_PASS:-test}
      MAIN_POSTGRES_DATABASE: ${MAIN_POSTGRES_DATABASE:-platform_agent}
      LOCAL_MAIN_POSTGRES_HOST: postgres
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
